name: convex-clustering
channels:
  - conda-forge   
  - defaults      

dependencies:
  - python=3.10

  # --- Core ---
  - numpy=2.1.3
  - scipy=1.15.3
  - scikit-learn=1.6.1
  - matplotlib=3.10.0
  - IPython=8.30.0

  # --- Jupyter ---
  - jupyterlab=4.3.4
  - ipykernel=6.29.5
  - ipython=8.30.0

  # --- Dev utilities ---
  - git

  - pip
  - pip:
    - pytest==8.2.0
    - pytest-cov==5.0.0
    - ruff==0.4.0
    - mypy==1.8.0
    - fastapi==0.11.0
    - "uvicorn[standard]==0.29.0"
    - pydantic==2.6.0
    - httpx==0.27.0
    - streamlit==1.35.0
    - plotly==5.22.0
    - hatchling==1.24.0
    - build==1.2.1
    - twine==5.1.0
    - "-e ."